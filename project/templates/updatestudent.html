{% extends 'baseadmin.html'%}

{% block title %}
  Delete Student
{% endblock title %}

{% block body %}

  {% include 'message.html' %}
  <div class="pagetitle">
    <h1>Updating Data</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item">Forms</li>
        <li class="breadcrumb-item active">Data</li>
      </ol>
    </nav>
  </div><!-- End Page Title -->

  <section class="section">
    <div class="row">
      <div class="col-lg-6">

        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Update Student</h5>

            <!-- General Form Elements -->
            <form action="/updatestudent" method="post">
              <div class="row mb-3">
                <label for="inputNumber" class="col-sm-2 col-form-label">Existing Student ID</label>
                <div class="col-sm-10">
                  <input type="number" class="form-control" name="sid">
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputText" class="col-sm-2 col-form-label">Student Name</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" name="sname">
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputNumber" class="col-sm-2 col-form-label">Batch ID</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" name="bid">
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputNumber" class="col-sm-2 col-form-label">System ID</label>
                <div class="col-sm-10">
                  <input type="number" class="form-control" name="sys_id">
                </div>
              </div>
              <div class="row mb-3">
                  <label for="inputEmai" class="col-sm-2 col-form-label">email</label>
                  <div class="col-sm-10">
                    <input type="email" class="form-control" name="semail">
                  </div>
                </div>
              <div class="row mb-3">
                <label for="inputDate" class="col-sm-2 col-form-label">DOB</label>
                <div class="col-sm-10">
                  <input type="date" class="form-control" name="dob">
                </div>
              </div>

              <div class="row mb-3">
                <label class="col-sm-2 col-form-label">UPDATE</label>
                <div class="col-sm-10">
                  <button type="submit" class="btn btn-primary">UPDATE</button>
                </div>
              </div>

            </form>

          </div>
        </div>

      </div>

      
    </div>
  </section>
{% endblock body %}
