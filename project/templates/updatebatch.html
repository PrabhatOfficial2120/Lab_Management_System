{% extends 'baseadmin.html'%}

{% block title %}
  Update Batch
{% endblock title %}

{% block body %}

  {% include 'message.html' %}
  <div class="pagetitle">
    <h1>Updating Data</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item">Forms</li>
        <li class="breadcrumb-item active">Data</li>
      </ol>
    </nav>
  </div><!-- End Page Title -->

  <section class="section">
    <div class="row">
      <div class="col-lg-6">

        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Update Batch</h5>

            <!-- General Form Elements -->
            <form action="/updatebatch" method="post">
              <div class="row mb-3">
                <label for="inputNumber" class="col-sm-2 col-form-label">Existing Batch ID</label>
                <div class="col-sm-10">
                  <input type="number" class="form-control" name="bid" required>
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputText" class="col-sm-2 col-form-label">Day</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" name="day">
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputText" class="col-sm-2 col-form-label">Time In</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" name="tin">
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputText" class="col-sm-2 col-form-label">Time Out</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" name="tout">
                </div>
              </div>
              <div class="row mb-3">
                  <label for="inputNumber" class="col-sm-2 col-form-label">Teacher ID</label>
                  <div class="col-sm-10">
                    <input type="number" class="form-control" name="btid" required>
                  </div>
                </div>
              <div class="row mb-3">
                <label class="col-sm-2 col-form-label">UPDATE</label>
                <div class="col-sm-10">
                  <button type="submit" class="btn btn-primary">UPDATE</button>
                </div>
              </div>

            </form><!-- End General Form Elements -->

          </div>
        </div>

      </div>

      
    </div>
  </section>
{% endblock body %}
