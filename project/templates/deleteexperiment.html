{% extends 'baseadmin.html'%}

{% block title %}
    Deleting Experiment
{% endblock title %}

{% block body %}

  {% include 'message.html' %}

  <div class="pagetitle">
    <h1>Deleting Data</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item">Forms</li>
        <li class="breadcrumb-item active">Data</li>
      </ol>
    </nav>
  </div><!-- End Page Title -->

    <section class="section">
      <div class="row">
        <div class="col-lg-6">

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Delete Experiment</h5>

              <!-- General Form Elements -->
              <form action="/deleteexperiment" method="post">
                <div class="row mb-3">
                  <label for="inputNumber" class="col-sm-2 col-form-label">Experiment ID</label>
                  <div class="col-sm-10">
                    <input type="number" class="form-control" name="e_id" required>
                  </div>
                </div>
                <div class="row mb-3">
                  <label class="col-sm-2 col-form-label">Submit Button</label>
                  <div class="col-sm-10">
                    <button type="submit" class="btn btn-primary">DELETE</button>
                  </div>
                </div>

              </form><!-- End General Form Elements -->

            </div>
          </div>

        </div>

        
      </div>
    </section>  

{% endblock body %}
