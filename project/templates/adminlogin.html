{% extends 'baselogin.html' %}
{% block title %}Admin Login{% endblock title %}
{% block form %}


<div class="row">
<div class="col-md-4"></div>

<div class="col-md-4">
<h2> Admin Login </h2>

<form action="/adminlogin" method="post">

{% include "message.html" %}

<div class="form-group">
<input type="text" class="form-control mt-2" placeholder="Enter Admin username" name="username" >
</div>


<div class="form-group">
<input type="password" class="form-control mt-2" placeholder="Enter Password" name="password" >
</div>
<br>
<button type="submit" class="btn btn-info">Login</button>


</form>
</div>


<div class="col-md-4"></div>

</div>


{% endblock form %}
