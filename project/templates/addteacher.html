{% extends 'baseadmin.html'%}

{% block title %}
  Add Teacher
{% endblock title %}

{% block body %}

  {% include 'message.html' %}
  <div class="pagetitle">
    <h1>Inserting Data</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/admin">Home</a></li>
        <li class="breadcrumb-item">Forms</li>
        <li class="breadcrumb-item active">Data</li>
      </ol>
    </nav>
  </div><!-- End Page Title -->

    <section class="section">
      <div class="row">
        <div class="col-lg-6">

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Add Teacher</h5>

              <!-- General Form Elements -->
              <form action="/addteacher" method="post">
                <div class="row mb-3">
                  <label for="inputNumber" class="col-sm-2 col-form-label">Teacher ID</label>
                  <div class="col-sm-10">
                    <input type="number" class="form-control" name="t_id" required>
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="inputTextext" class="col-sm-2 col-form-label">Teacher Name</label>
                  <div class="col-sm-10">
                    <input type="text" class="form-control" name="tname">
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="inputText" class="col-sm-2 col-form-label">Subject Code</label>
                  <div class="col-sm-10">
                    <input type="text" class="form-control" name="sub_code">
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="inputText" class="col-sm-2 col-form-label">Subject name</label>
                  <div class="col-sm-10">
                    <input type="text" class="form-control" name="sub_name">
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="inputDate" class="col-sm-2 col-form-label">DOB</label>
                  <div class="col-sm-10">
                    <input type="date" class="form-control" name="dob" required>
                  </div>
                </div>

                <div class="row mb-3">
                  <label class="col-sm-2 col-form-label">Submit Button</label>
                  <div class="col-sm-10">
                    <button type="submit" class="btn btn-primary">Submit Form</button>
                  </div>
                </div>

              </form><!-- End General Form Elements -->

            </div>
          </div>

        </div>

        
      </div>
    </section>
{% endblock body %}
